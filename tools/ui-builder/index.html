<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dofus UI Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Left: Toolbox + Node tree ─── */
    #left-panel {
      width: 240px;
      background: #252526;
      border-right: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .section-title {
      padding: 8px 12px 4px;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #3c3c3c;
    }

    /* Panel controls */
    #panel-controls {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid #3c3c3c;
    }
    #panel-controls .row { display: flex; gap: 4px; }
    #panel-controls input {
      width: 60px;
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      color: #d4d4d4;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
    }
    #panel-controls label { font-size: 10px; color: #888; }

    /* Toolbox */
    #toolbox {
      padding: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      border-bottom: 1px solid #3c3c3c;
    }
    .tool-btn {
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      color: #ccc;
      padding: 6px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: background 0.15s;
    }
    .tool-btn:hover { background: #3c3c3c; border-color: #555; }
    .tool-btn .icon { display: block; margin: 0 auto 3px; }

    /* Node tree */
    #node-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      min-height: 0;
    }
    .tree-node {
      padding: 3px 8px 3px 12px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 2px solid transparent;
    }
    .tree-node:hover { background: #2a2d2e; }
    .tree-node.selected { background: #094771; border-left-color: #0078d4; }
    .tree-node .type { color: #4ec9b0; }
    .tree-node .id { color: #9cdcfe; font-size: 10px; }
    .tree-node .del-btn {
      background: none; border: none; color: #666; cursor: pointer;
      font-size: 13px; padding: 0 4px; visibility: hidden;
    }
    .tree-node:hover .del-btn { visibility: visible; }
    .tree-node .del-btn:hover { color: #f44; }

    /* ─── Center: Canvas ─── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Toolbar */
    #toolbar {
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    #toolbar button {
      background: #3c3c3c;
      border: 1px solid #555;
      color: #ccc;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }
    #toolbar button:hover { background: #505050; }
    #toolbar .sep { width: 1px; height: 20px; background: #555; }
    #toolbar label { color: #888; font-size: 11px; }
    #toolbar input[type="checkbox"] { margin-right: 2px; }
    #toolbar select {
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      color: #d4d4d4;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* Canvas */
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: #1a1a1a;
      background-image:
        linear-gradient(45deg, #222 25%, transparent 25%),
        linear-gradient(-45deg, #222 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #222 75%),
        linear-gradient(-45deg, transparent 75%, #222 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    /* ─── Right: Properties + JSON ─── */
    #right-panel {
      width: 260px;
      background: #252526;
      border-left: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #props {
      padding: 8px;
      overflow-y: auto;
      border-bottom: 1px solid #3c3c3c;
      max-height: 50%;
    }
    #props h3 {
      font-size: 13px;
      color: #4ec9b0;
      margin-bottom: 8px;
    }
    .prop-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      gap: 6px;
    }
    .prop-row label {
      font-size: 10px;
      color: #888;
      min-width: 65px;
      text-align: right;
    }
    .prop-row input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      color: #d4d4d4;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .prop-row input:focus { outline: none; border-color: #0078d4; }
    .prop-row input[type="color"] { width: 30px; height: 22px; padding: 1px; }

    .hint { color: #555; font-size: 11px; padding: 8px; line-height: 1.5; }

    #json-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 8px 8px;
      min-height: 0;
    }
    #json-area {
      flex: 1;
      background: #1e1e1e;
      color: #b5e853;
      border: 1px solid #3c3c3c;
      border-radius: 3px;
      padding: 6px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
      resize: none;
      tab-size: 2;
    }
    .action-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .action-row button {
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      color: #fff;
    }
    .btn-export { background: #0e639c; }
    .btn-export:hover { background: #1177bb; }
    .btn-import { background: #388a34; }
    .btn-import:hover { background: #45a041; }
  </style>
</head>
<body>
  <div id="left-panel">
    <div class="section-title">Panel</div>
    <div id="panel-controls">
      <div class="row">
        <div><label>Name</label><input id="panel-name" type="text" value="" placeholder="nom" style="width:120px"></div>
      </div>
      <div class="row">
        <div><label>L</label><input id="panel-l" type="number" value="" placeholder="l" style="width:50px"></div>
        <div><label>T</label><input id="panel-t" type="number" value="" placeholder="t" style="width:50px"></div>
        <div><label>R</label><input id="panel-r" type="number" value="" placeholder="r" style="width:50px"></div>
        <div><label>B</label><input id="panel-b" type="number" value="" placeholder="b" style="width:50px"></div>
      </div>
      <div class="row">
        <div><label>Title</label><input id="panel-title" type="text" value="" placeholder="Header title" style="width:120px"></div>
      </div>
      <div class="row">
        <div><label>BG</label><input id="panel-bg" type="color" value="#ddd7b2" style="width:36px;height:22px"></div>
        <div><label>Border</label><input id="panel-border" type="color" value="#8a7f5f" style="width:36px;height:22px"></div>
        <div><label>Header</label><input id="panel-header-bg" type="color" value="#5c5040" style="width:36px;height:22px"></div>
      </div>
    </div>

    <div class="section-title">Add Node</div>
    <div id="toolbox">
      <button class="tool-btn" data-type="rect"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/></svg>Rect</button>
      <button class="tool-btn" data-type="text"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3h8M7 3v9M5 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Text</button>
      <button class="tool-btn" data-type="slot"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="4" y="4" width="6" height="6" rx=".5" stroke="currentColor" stroke-width=".8" opacity=".4"/></svg>Slot</button>
      <button class="tool-btn" data-type="sprite"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.1"/><circle cx="5" cy="5" r="1.5" stroke="currentColor" stroke-width=".9"/><path d="M1 10l3-3 2 2 3-4 4 5" stroke="currentColor" stroke-width=".9" stroke-linejoin="round"/></svg>Sprite</button>
      <button class="tool-btn" data-type="bar"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="5" width="12" height="4" rx="2" stroke="currentColor" stroke-width="1.1"/><rect x="2" y="6" width="6" height="2" rx="1" fill="currentColor" opacity=".4"/></svg>Bar</button>
      <button class="tool-btn" data-type="divider"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Divider</button>
      <button class="tool-btn" data-type="scroll-list"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.1"/><path d="M3 4h5M3 7h5M3 10h3" stroke="currentColor" stroke-width=".9" stroke-linecap="round" opacity=".5"/><rect x="12" y="2" width="1.5" height="4" rx=".75" fill="currentColor" opacity=".4"/></svg>List</button>
      <button class="tool-btn" data-type="repeat-column"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="1" width="8" height="3" rx=".8" stroke="currentColor" stroke-width="1"/><rect x="3" y="5.5" width="8" height="3" rx=".8" stroke="currentColor" stroke-width="1"/><rect x="3" y="10" width="8" height="3" rx=".8" stroke="currentColor" stroke-width="1"/></svg>Repeat</button>
      <button class="tool-btn" data-type="group"><svg class="icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1" stroke-dasharray="2 1.5"/><rect x="3" y="3" width="4" height="4" rx=".5" stroke="currentColor" stroke-width=".9" opacity=".5"/><rect x="7" y="7" width="4" height="4" rx=".5" stroke="currentColor" stroke-width=".9" opacity=".5"/></svg>Group</button>
    </div>

    <div class="section-title">Node Tree</div>
    <div id="node-tree"></div>
  </div>

  <div id="center">
    <div id="toolbar">
      <button id="btn-home" title="Accueil"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:middle"><path d="M2 7l5-5 5 5M3 6.5V12h3V9h2v3h3V6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <select id="panel-select"></select>
      <button id="btn-new">New Panel</button>
      <div class="sep"></div>
      <button id="btn-duplicate">Duplicate</button>
      <button id="btn-delete" style="color:#f88">Delete</button>
      <div class="sep"></div>
      <label><input type="checkbox" id="snap-toggle" checked> Snap 4px</label>
      <div class="sep"></div>
      <label><input type="checkbox" id="viewport-toggle" checked> Viewport</label>
      <div style="flex:1"></div>
      <span id="status" style="color:#888;font-size:10px;margin-right:8px">✓ saved</span>
      <div class="sep"></div>
      <button id="btn-zoom-in">+</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-out">−</button>
    </div>
    <div id="canvas-wrap"></div>
  </div>

  <div id="right-panel">
    <div class="section-title">Properties</div>
    <div id="props"></div>
    <div style="display:flex;border-bottom:1px solid #3c3c3c">
      <button class="tab-btn active" id="tab-json" style="flex:1;background:#252526;border:none;color:#ccc;padding:6px;cursor:pointer;font-size:11px;border-bottom:2px solid #0078d4">JSON</button>
      <button class="tab-btn" id="tab-code" style="flex:1;background:#252526;border:none;color:#666;padding:6px;cursor:pointer;font-size:11px;border-bottom:2px solid transparent">Code TS</button>
    </div>
    <div id="json-wrap">
      <textarea id="json-area" spellcheck="false"></textarea>
      <div class="action-row">
        <button class="btn-export" id="btn-export">Copy JSON</button>
        <button class="btn-import" id="btn-import">Import JSON</button>
      </div>
    </div>
    <div id="code-wrap" style="display:none;flex:1;flex-direction:column;padding:0 8px 8px;min-height:0">
      <textarea id="code-area" spellcheck="false" readonly style="flex:1;background:#1e1e1e;color:#d4d4d4;border:1px solid #3c3c3c;border-radius:3px;padding:6px;font-family:'JetBrains Mono',monospace;font-size:10px;resize:none;tab-size:2"></textarea>
      <div class="action-row">
        <button class="btn-export" id="btn-copy-code">Copy Code</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
